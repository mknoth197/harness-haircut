name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token. CI only reads source; no writes, no deploys.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build before typecheck because test/ imports from ../dist/index.js
      # to validate the built artifact end-to-end.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: node --test "test/**/*.test.ts"
