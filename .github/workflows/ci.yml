name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token. CI only reads source; no writes, no deploys.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build before typecheck because test/ imports from ../dist/index.js
      # to validate the built artifact end-to-end.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: node --test "test/**/*.test.ts"
