# harness-haircut drift check — paste into .github/workflows/ (I1, PRD §13).
#
# Runs `harness-haircut audit --fail-on drift` on every push and pull request.
# The audit is read-only; with `--fail-on drift` it fails ONLY on real drift
# (exit 1) or invalid config (exit 3). A standing lossy-translation warning
# (exit 2 — e.g. HH-W001/W007, permanent properties of your globs/providers)
# still PRINTS but does not fail the check, matching the pre-commit hook's
# policy so a drift-free repo's CI is never permanently red. Drop the flag to
# also fail on warnings. Action SHAs are pinned to match this repo's ci.yml.
name: harness-haircut

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: the audit only reads the checked-out source.
permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm

      # Install your project's deps so the repo is in its committed state.
      - name: Install
        run: npm ci

      # Fails the check on drift (exit 1) or invalid config (exit 3). A standing
      # lossy-translation warning (exit 2) prints but does not fail — drop
      # `--fail-on drift` to treat warnings as failures too.
      - name: Audit AI-provider configuration drift
        run: npx harness-haircut audit --fail-on drift
